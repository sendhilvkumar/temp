<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tab Test - Enhanced Multi-Domain Active Directory Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏢</text></svg>">
    <link rel="stylesheet" href="style-additions.css">
    <style>
        /* Copy essential styles from main dashboard */
        :root {
            --primary-blue: #3498db;
            --primary-dark: #2c3e50;
            --primary-light: #ecf0f1;
            --success: #27ae60;
            --warning: #f39c12;
            --error: #e74c3c;
            --info: #3498db;
            --gray-100: #f8f9fa;
            --gray-200: #e9ecef;
            --gray-300: #dee2e6;
            --gray-400: #ced4da;
            --gray-500: #adb5bd;
            --gray-600: #6c757d;
            --gray-700: #495057;
            --gray-800: #343a40;
            --gray-900: #212529;
            --spacing-xs: 0.25rem;
            --spacing-sm: 0.5rem;
            --spacing-md: 1rem;
            --spacing-lg: 1.5rem;
            --spacing-xl: 2rem;
            --spacing-2xl: 3rem;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .tabs-container {
            margin-top: 20px;
        }

        .tabs-header {
            display: flex;
            border-bottom: 2px solid var(--gray-300);
            margin-bottom: 20px;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 12px 24px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--gray-600);
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .tab-btn:hover {
            color: var(--primary-blue);
            background: var(--gray-100);
        }

        .tab-btn.active {
            color: var(--primary-blue);
            border-bottom-color: var(--primary-blue);
            background: var(--gray-100);
        }

        .tab-content {
            min-height: 400px;
            padding: 20px;
            background: white;
            border-radius: 8px;
            border: 1px solid var(--gray-300);
        }

        .debug-info {
            background: var(--gray-100);
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Tab Functionality Test</h1>
        
        <div class="debug-info">
            <strong>Debug Info:</strong><br>
            <span id="debugInfo">Loading...</span>
        </div>

        <div class="tabs-container">
            <nav class="tabs-header">
                <button class="tab-btn active" data-tab="overview">📊 Overview</button>
                <button class="tab-btn" data-tab="users">👥 Users</button>
                <button class="tab-btn" data-tab="computers">💻 Computers</button>
                <button class="tab-btn" data-tab="security">🔒 Security</button>
                <button class="tab-btn" data-tab="domains">🏢 Domains</button>
                <button class="tab-btn" data-tab="reports">📋 Reports</button>
            </nav>
            <div class="tab-content" id="tabContent">
                <div>Loading tab content...</div>
            </div>
        </div>
    </div>

    <!-- Load the scripts in the same order as the main dashboard -->
    <script src="enhanced-dashboard-data.js"></script>
    <script src="script.js"></script>
    <script>
        // Test script to verify tab functionality
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🧪 Tab test page loaded');
            
            // Update debug info
            const debugInfo = document.getElementById('debugInfo');
            let debugText = '';
            
            if (window.embeddedConsolidatedData) {
                debugText += 'Embedded data: ✅ Found<br>';
                debugText += `Domains: ${window.embeddedConsolidatedData.metadata.totalDomains}<br>`;
                debugText += `Users: ${window.embeddedConsolidatedData.aggregatedSummary.totalUsers}<br>`;
                debugText += `Computers: ${window.embeddedConsolidatedData.aggregatedSummary.totalComputers}<br>`;
            } else {
                debugText += 'Embedded data: ❌ Not found<br>';
            }
            
            if (typeof ContentGenerator !== 'undefined') {
                debugText += 'ContentGenerator: ✅ Available<br>';
            } else {
                debugText += 'ContentGenerator: ❌ Not available<br>';
            }
            
            if (typeof dashboardState !== 'undefined') {
                debugText += 'Dashboard state: ✅ Available<br>';
                debugText += `Current domain: ${dashboardState.currentDomain}<br>`;
                debugText += `Has data: ${dashboardState.consolidatedData ? '✅' : '❌'}<br>`;
            } else {
                debugText += 'Dashboard state: ❌ Not available<br>';
            }
            
            debugInfo.innerHTML = debugText;
            
            // Set up tab click handlers
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const tabName = this.getAttribute('data-tab');
                    console.log('🧪 Tab clicked:', tabName);
                    
                    // Update active tab
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    
                    // Generate content
                    const tabContent = document.getElementById('tabContent');
                    let content = '';
                    
                    try {
                        switch (tabName) {
                            case 'overview':
                                content = ContentGenerator.generateOverviewContent();
                                break;
                            case 'users':
                                content = ContentGenerator.generateUsersContent();
                                break;
                            case 'computers':
                                content = ContentGenerator.generateComputersContent();
                                break;
                            case 'security':
                                content = ContentGenerator.generateSecurityContent();
                                break;
                            case 'domains':
                                content = ContentGenerator.generateDomainsContent();
                                break;
                            case 'reports':
                                content = ContentGenerator.generateReportsContent();
                                break;
                            default:
                                content = '<div>Tab content not available</div>';
                        }
                        
                        tabContent.innerHTML = content;
                        console.log('🧪 Content generated for:', tabName);
                        
                    } catch (error) {
                        console.error('🧪 Error generating content for', tabName, ':', error);
                        tabContent.innerHTML = `<div>Error generating content: ${error.message}</div>`;
                    }
                });
            });
            
            // Initialize with overview tab
            document.querySelector('[data-tab="overview"]').click();
        });
    </script>
</body>
</html>
